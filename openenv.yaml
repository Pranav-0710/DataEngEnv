name: DataEngEnv
version: "1.0.0"
description: "ML Data Pipeline Debugger — AI agent fixes broken ML pipelines before production"
tags: [openenv, data-engineering, machine-learning, debugging, real-world]
tasks:
  - {id: 1, name: column_rename_bug, difficulty: easy}
  - {id: 2, name: dirty_data, difficulty: medium}
  - {id: 3, name: data_leakage, difficulty: hard}
endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
  grader: POST /grader
  baseline: GET /baseline
observation_space:
  task_id: int
  step_number: int
  script_content: str
  last_run_output: str
  last_run_error: "str | null"
  data_preview: str
  schema_info: dict
  done: bool
action_space:
  - {type: inspect_data, payload: {}}
  - {type: check_schema, payload: {}}
  - {type: run_script, payload: {}}
  - {type: edit_script, payload: {old: str, new: str}}
  - {type: submit, payload: {}}
reward_range: [0.0, 1.0]
max_steps: 20
